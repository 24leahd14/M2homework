name: Rank Courses from Exit Survey

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  rank-courses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate rankings
        run: python scripts/rank_courses.py

      - name: Upload ranking artifacts
        uses: actions/upload-artifact@v4
        with:
          name: survey-course-rankings
          path: |
            results/course_rankings.csv
            results/course_rankings.md
